<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Contacto</title>

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    background: #3d3da6;
}

.navbar a {
    color: white;
    text-decoration: none;
    font-size: 18px;
}

.navbar ul {
    list-style: none;
    display: flex;
    gap: 30px;
}

.hero {
    position: relative;
    height: 90vh;
    background: url('cita.jpg') no-repeat center/cover;
    display: flex;
    align-items: center;
}

.overlay {
    position: absolute;
    width: 50%;
    height: 100%;
    background: rgba(61, 61, 166, 0.6);
}


.content {
    position: relative;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 60px;
    text-align: center;
}


.left {
    width: 45%;
    color: white;
}

.left img {
    width: 120px;
    margin-bottom: 20px;
}

.left p {
    margin-bottom: 15px;
    font-size: 18px;
}


.form-box {
    width: 35%;
    background: rgba(61, 61, 166, 0.9);
    padding: 30px;
    border-radius: 6px;
    color: white;
}


.form-box h2 {
    text-align: center;
    margin-bottom: 20px;
}

.form-box label {
    display: block;
    margin-top: 10px;
    font-size: 14px;
}

.form-box input {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    margin-bottom: 10px;
    border: none;
    background: white;
    color: black;
}

.form-box button {
    margin-top: 10px;
    padding: 8px 15px;
    background: white;
    color: #3d3da6;
    border: none;
    cursor: pointer;
    width: 100%;
}

.mensaje {
    margin-top: 10px;
    text-align: center;
}

</style>
</head>

<body>

<nav class="navbar">
    <a href="index.html">Inicio</a>
    <ul>
        <li><a href="nosotros.html">Nosotros</a></li>
        <li><a href="servicio.html">Servicios</a></li>
        <li><a href="equipo.html">Equipo</a></li>
        <li><a href="contacto.html">Contacto</a></li>
    </ul>
</nav>

<section class="hero">

    <div class="overlay"></div>

    <div class="content">

        <div class="left">
            <img src="DENTISTA.png">
            <p>Correo: odontologiamid@gmail.com</p>
            <p>Teléfono: 9991451996</p>
        </div>

        <div class="form-box">
            <h2>AGENDA</h2>

            <form id="miformulario">

                <label>Apellido:</label>
                <input type="text" id="apellidos" required>

                <label>Nombre:</label>
                <input type="text" id="nombres" required>

                <label>Teléfono:</label>
                <input type="tel" id="telefono" required>

                <label>Correo electrónico:</label>
                <input type="email" id="correo" required>

                <label>Edad:</label>
                <input type="number" id="edad" required>

                <button type="submit">Enviar</button>

            </form>

            <p class="mensaje" id="mensaje"></p>
        </div>

    </div>

</section>

<script>

const url = "https://script.google.com/macros/s/AKfycbyRHw3fyuVVne4LPDLskMFxLcqskXw7ezQfHDU6rcfXEhOYkeg5_e5fSZwUb3-HkQoD_w/exec";

const form = document.getElementById("miformulario");
const mensaje = document.getElementById("mensaje");

form.addEventListener("submit", function(e){

    e.preventDefault();

    const datos = {
        apellidos: document.getElementById("apellidos").value,
        nombres: document.getElementById("nombres").value,
        telefono: document.getElementById("telefono").value,
        correo: document.getElementById("correo").value,
        edad: document.getElementById("edad").value
    };

    console.log("Datos enviados:", datos);

    fetch(url, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(datos),
        mode: "no-cors"
    })
    .then(() => {
        mensaje.innerHTML = "Datos enviados correctamente";
        form.reset();
    })
    .catch(() => {
        mensaje.innerHTML = "Error al enviar";
    });

});

</script>

</body>
</html>
