<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mérida Odontología</title>

    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}


.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    background: #001f8f;
}

.navbar ul {
    list-style: none;
    display: flex;
    gap: 30px;
}

.navbar a {
    text-decoration: none;
    color: #ffffff;
    font-weight: 500;
}


.hero {
    position: relative;
    height: 90vh;
    background: url('inicio img.png') no-repeat center center/cover;
    display: flex;
    align-items: center;
}


.overlay {
    position: absolute;
    width: 50%;
    height: 100%;
    background: rgba(61, 61, 166, 0.6);
}


.content {
    position: relative;
    width: 50%;
    padding: 60px;
    color: white;
}

.logo-img {
    width: 120px;
    margin-bottom: 20px;
}

.content p {
    margin-bottom: 20px;
    line-height: 1.6;
}


.buttons {
    margin-bottom: 20px;
}

.btn {
    display: inline-block;
    padding: 10px 20px;
    margin-right: 10px;
    background: #eaeaea;
    color: #2c2c6c;
    text-decoration: none;
    font-weight: bold;
}

.social i {
    margin-right: 15px;
    font-size: 20px;
    cursor: pointer;
}
</style>
<body>
<nav class="navbar">
    <div>Inicio</div>
    <ul>
        <li><a href="nosotros.html">Nosotros</a></li>
        <li><a href="servicio.html">Servicios</a></li>
        <li><a href="equipo.html">Equipo</a></li>
        <li><a href="contacto.html">Contacto</a></li>
    </ul>
</nav>

   
    <section class="hero">

        <
        <div class="overlay"></div>

        
        <div class="content">
            <img src="DENTISTA.png" alt="Logo" class="logo-img">

            <p>
                Somos una clínica dedicada al cuidado avanzado y preventivo de tu sonrisa.
                Combinamos tecnología de vanguardia con un trato humano para ofrecer
                soluciones completas en salud oral, estética y bienestar general.
            </p>
            <div class="buttons">
                <a href="contacto.html" class="btn">Agenda Aqui
                <a href="servicio.html" class="btn"> Servicios
            </a>
            </div>

            <div class="social">
                <i class="fab fa-facebook-f"></i>
                <i class="fab fa-whatsapp"></i>
                <i class="fab fa-instagram"></i>
            </div>
            

    </section>

</body>
</html>
